{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>用户注册</h2>
    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form action="/register" method="POST" class="login-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="3-32位字母、数字或下划线" required
                   minlength="3" maxlength="32" pattern="[a-zA-Z0-9_一-龥]{3,32}">
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="至少8位，包含字母和数字" required
                   minlength="8">
        </div>
        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" placeholder="请输入邮箱（可选）">
        </div>
        <div class="form-group">
            <label for="phone">手机号</label>
            <input type="text" id="phone" name="phone" placeholder="请输入11位手机号（可选）"
                   pattern="1[3-9]\d{9}">
        </div>
        <button type="submit" class="btn btn-primary">注册</button>
    </form>
    <p class="form-footer">
        已有账号？<a href="/login">去登录</a>
    </p>
</div>
{% endblock %}
