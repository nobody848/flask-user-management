{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>个人中心</h2>

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        <p style="text-align: center;"><a href="/">返回首页</a></p>
    {% elif user %}
        <h3>用户信息</h3>
        <ul class="info-list">
            <li><span class="info-label">ID：</span>{{ user.id }}</li>
            <li><span class="info-label">用户名：</span>{{ user.username }}</li>
            <li><span class="info-label">邮箱：</span>{{ user.email }}</li>
            <li><span class="info-label">手机：</span>{{ user.phone }}</li>
            <li><span class="info-label">角色：</span>{{ user.role }}</li>
            <li><span class="info-label">余额：</span>{{ user.balance }}</li>
        </ul>

        <hr>
        <h3>充值</h3>
        <form action="/recharge" method="POST" class="recharge-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="user_id" value="{{ user.id }}">
            <div class="form-group">
                <label for="amount">充值金额</label>
                <input type="number" id="amount" name="amount" step="0.01" placeholder="请输入充值金额" class="recharge-input">
            </div>
            <button type="submit" class="btn btn-primary">确认充值</button>
        </form>

        <hr>
        <h3>修改密码</h3>
        <form action="/change-password" method="POST" class="change-password-form">
            <input type="hidden" name="username" value="{{ user.username }}">
            <div class="form-group">
                <label for="new_password">新密码</label>
                <input type="password" id="new_password" name="new_password" placeholder="请输入新密码（至少8位）" required minlength="8">
            </div>
            <div class="form-group">
                <label for="confirm_password">确认密码</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="请再次输入新密码" required minlength="8">
            </div>
            <button type="submit" class="btn btn-primary">修改密码</button>
        </form>

        <hr>
        <p style="text-align: center;">
            <a href="/">返回首页</a>
        </p>
    {% endif %}
</div>
{% endblock %}
